name: 功能问题 / Bug 反馈
description: 提交功能异常、崩溃、结果错误等问题（请尽量附上源文件、配置、日志、JSON 数据）
title: "[BUG] "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        为了提高定位效率，请尽量完整填写。
        提交前请先搜索现有 Issues，确认不是重复问题。
        涉及隐私或密钥请先脱敏（例如 API Key、账号、路径中的用户名）。
        
        常用文件路径（当前版本）：
        - 日志（开发环境）：`result/log_*.txt`
        - 日志（打包环境）：`_internal/result/log_*.txt`
        - 主配置：`examples/config.json`
        - 配置模板：`examples/config-example.json`
        - 翻译器配置：`examples/config/translators.json`
        
        隐私提醒：
        - 不要上传 `.env` 原文、账号、API Key、Cookie、Token
        - 不要上传包含密钥的完整预设文件（`presets/*.json`）
        - 仅提供脱敏后的关键字段即可

  - type: dropdown
    id: issue_type
    attributes:
      label: 问题类型
      description: 请选择最接近的类型
      options:
        - 功能异常（已有功能不符合预期）
        - 崩溃/卡死（程序退出、无响应、黑屏等）
        - 识别/翻译/渲染结果错误
        - 性能问题（速度慢、内存/显存异常）
        - 其他
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 一句话说明问题是什么、影响什么
      placeholder: 例如：批量翻译时第 3 张图开始持续报错并跳过输出
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序写清楚操作路径，便于稳定复现
      placeholder: |
        1. 打开 xxx 界面
        2. 选择 xxx 模型与预设
        3. 导入 xxx 图片后点击开始
        4. 约 5 秒后出现 xxx 报错
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: 期望结果 vs 实际结果
      placeholder: |
        期望：...
        实际：...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 请尽量提供完整版本信息
      placeholder: |
        - OS: Windows 11 23H2
        - Python: 3.12.x
        - 启动方式: 步骤2-启动Qt界面.bat
        - 分支/提交: main@<commit>
        - GPU/驱动: RTX 4060 / 551.xx
    validations:
      required: true

  - type: textarea
    id: source_files
    attributes:
      label: 源文件 / 输入样本（尽量提供）
      description: 提供最小可复现输入；可上传文件或给出可下载链接
      placeholder: |
        - 原图/输入文件:
        - 最小复现样例:
        - 预期输出样例:
    validations:
      required: true

  - type: textarea
    id: config_files
    attributes:
      label: 配置文件（尽量完整）
      description: 请贴出关键配置，或上传你实际使用到的配置文件；敏感字段请脱敏（不要直接上传 .env 或含密钥预设）
      placeholder: |
        - 使用的配置文件路径（请写全）:
          - examples/config.json
          - <你的其他配置文件路径>
        - 关键配置内容:
        ```json
        {
          "translator": "...",
          "detector": "...",
          "renderer": "..."
        }
        ```
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志（必须提供）
      description: 至少提供一段报错日志和时间点；建议上传完整日志文件。当前版本优先提供 result/log_*.txt（打包版为 _internal/result/log_*.txt）
      placeholder: |
        - 日志文件路径:
          - result/log_20260228003000.txt
        - 发生时间:
        - 关键报错片段:
        ```text
        Traceback (most recent call last):
        ...
        ```
    validations:
      required: true

  - type: textarea
    id: json_data
    attributes:
      label: 相关 JSON 数据（尽量提供）
      description: 如请求体、响应体、识别结果、textblocks 等
      placeholder: |
        ```json
        {
          "image": "sample_01.png",
          "textblocks": []
        }
        ```
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交检查
      options:
        - label: 我已搜索现有 Issues，确认这不是重复问题
          required: true
        - label: 我已确认提供了可复现步骤与最小样例
          required: true
        - label: 我已尽量提供源文件、配置文件、日志与 JSON 数据（如无法提供，已在上文说明原因）
          required: true
        - label: 我已对敏感信息做脱敏处理
          required: true

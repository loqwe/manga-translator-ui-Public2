name: 功能建议 / Feature Request
description: 提交新功能、交互优化、流程改进建议
title: "[FEATURE] "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        请尽量描述你的使用场景和期望效果。
        提交前请先搜索现有 Issues，确认不是重复建议。
        如果是“已有功能行为不对”，请改用「功能问题 / Bug 反馈」模板。

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你在什么场景下遇到了限制或低效点
      placeholder: 例如：批量处理竖排漫画时，需要手动反复调整同一类参数
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望功能
      description: 描述你希望新增/改进的行为
      placeholder: |
        建议新增：
        - ...
        交互预期：
        - ...
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: 价值与收益
      description: 该功能能解决什么问题，优先级为什么高
      placeholder: 可节省多少时间、减少多少误操作、覆盖哪些用户
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 参考资料（可选）
      description: 可附原型图、截图、日志、JSON 示例、相关 issue 链接
      placeholder: |
        - 截图/原型:
        - 示例 JSON:
        - 相关 issue/PR:
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 提交检查
      options:
        - label: 我已搜索现有 Issues，确认这不是重复建议
          required: true
        - label: 我已确认这不是已有功能异常（若是异常我会改提 Bug 模板）
          required: true
        - label: 我已尽量提供场景、预期和可执行的建议
          required: true
